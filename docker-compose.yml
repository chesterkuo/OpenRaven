services:
  postgres:
    image: postgres:16-alpine
    container_name: openraven-postgres
    environment:
      POSTGRES_USER: openraven
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openraven}
      POSTGRES_DB: openraven
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openraven"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: openraven-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-openraven123}
      NEO4J_server_memory_heap_max__size: 512m
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 10s
      retries: 5

  openraven-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: openraven-api
    environment:
      DATABASE_URL: postgresql://openraven:${POSTGRES_PASSWORD:-openraven}@postgres:5432/openraven
      GRAPH_BACKEND: ${GRAPH_BACKEND:-networkx}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-openraven123}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    volumes:
      - tenant_data:/data/tenants
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8741/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  openraven-ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    container_name: openraven-ui
    environment:
      CORE_API_URL: http://openraven-api:8741
    depends_on:
      openraven-api:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: openraven-nginx
    ports:
      - "${PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - openraven-ui
      - openraven-api

volumes:
  pg_data:
  neo4j_data:
  tenant_data:
